<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Auto Fill Profile</h1>

  <div class="field-row">
    <div class="field half">
      <label for="lastName">姓</label>
      <input type="text" id="lastName" placeholder="例：山田">
    </div>
    <div class="field half">
      <label for="firstName">名</label>
      <input type="text" id="firstName" placeholder="例：太郎">
    </div>
  </div>

  <div class="field-row">
    <div class="field half">
      <label for="lastNameKana">姓（ふりがな）</label>
      <input type="text" id="lastNameKana" placeholder="例：やまだ">
    </div>
    <div class="field half">
      <label for="firstNameKana">名（ふりがな）</label>
      <input type="text" id="firstNameKana" placeholder="例：たろう">
    </div>
  </div>

  <div class="field">
    <label for="facility">施設名・組織名</label>
    <input type="text" id="facility" placeholder="例：〇〇クリニック">
  </div>

  <div class="field">
    <label for="email">メールアドレス</label>
    <input type="email" id="email" placeholder="例：taro@example.com">
  </div>

  <div class="field">
    <label for="phone">電話番号</label>
    <input type="tel" id="phone" placeholder="例：090-1234-5678">
  </div>

  <div class="field">
    <label for="prefecture">都道府県</label>
    <input type="text" id="prefecture" placeholder="例：東京都">
  </div>

  <div class="field">
    <label for="jobTitle">役職</label>
    <input type="text" id="jobTitle" placeholder="例：院長">
  </div>

  <div class="field">
    <label for="department">診療科</label>
    <input type="text" id="department" placeholder="例：内科">
  </div>

  <div class="field">
    <label for="jobType">職種</label>
    <input type="text" id="jobType" placeholder="例：医師">
  </div>

  <div class="actions">
    <button id="save">💾 保存</button>
    <button id="fill" class="primary">✏️ 自動入力</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
