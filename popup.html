<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Auto Fill Profile</h1>

  <div class="field-row">
    <div class="field half">
      <label for="lastName">姓</label>
      <input type="text" id="lastName" placeholder="山田">
    </div>
    <div class="field half">
      <label for="firstName">名</label>
      <input type="text" id="firstName" placeholder="太郎">
    </div>
  </div>

  <div class="field-row">
    <div class="field half">
      <label for="lastNameKana">姓（ふりがな）</label>
      <input type="text" id="lastNameKana" placeholder="やまだ">
    </div>
    <div class="field half">
      <label for="firstNameKana">名（ふりがな）</label>
      <input type="text" id="firstNameKana" placeholder="たろう">
    </div>
  </div>

  <div class="field-row">
    <div class="field half">
      <label for="birthDate">生年月日</label>
      <input type="date" id="birthDate">
    </div>
    <div class="field half">
      <label for="phone">電話番号</label>
      <input type="tel" id="phone" placeholder="090-1234-5678">
    </div>
  </div>

  <div class="field">
    <label for="email">メールアドレス</label>
    <input type="email" id="email" placeholder="taro@example.com">
  </div>

  <div class="field">
    <label for="facility">施設名・組織名</label>
    <input type="text" id="facility" placeholder="〇〇クリニック">
  </div>

  <div class="field-row">
    <div class="field half">
      <label for="postalCode">郵便番号</label>
      <input type="text" id="postalCode" placeholder="100-0001">
    </div>
    <div class="field half">
      <label for="prefecture">都道府県</label>
      <input type="text" id="prefecture" placeholder="東京都">
    </div>
  </div>

  <div class="field">
    <label for="address">住所</label>
    <input type="text" id="address" placeholder="千代田区千代田1-1">
  </div>

  <div class="field-row triple">
    <div class="field third">
      <label for="jobTitle">役職</label>
      <input type="text" id="jobTitle" placeholder="院長">
    </div>
    <div class="field third">
      <label for="department">診療科</label>
      <input type="text" id="department" placeholder="内科">
    </div>
    <div class="field third">
      <label for="jobType">職種</label>
      <input type="text" id="jobType" placeholder="医師">
    </div>
  </div>

  <div class="actions">
    <button id="save">💾 保存</button>
    <button id="fill" class="primary">✏️ 自動入力</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
